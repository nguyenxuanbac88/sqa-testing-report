name: .NET CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Install dotnet-format
      run: |
        dotnet tool install -g dotnet-format || true
        echo "## Add dotnet tools to PATH"
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Restore
      run: dotnet restore

    - name: Check code style with dotnet format
      run: |
        # verify-no-changes will fail the job if formatting is required
        dotnet format --verify-no-changes

    - name: Build
      run: dotnet build --no-restore --no-incremental --configuration Release

    - name: Test
      run: dotnet test --no-build --verbosity normal
