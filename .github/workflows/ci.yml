name: .NET CI

on:
  push:
    branches: [ "**" ]   # 🔥 chạy cho tất cả các nhánh
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Install dotnet-format
      run: |
        dotnet tool install -g dotnet-format || true
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --verbosity normal

  merge_develop:
    name: Merge into develop if build passes
    needs: build

    # 🔥 chỉ merge khi push vào main/master (tránh merge nhánh test linh tinh)
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}

    runs-on: ubuntu-latest

    steps:
    - name: Checkout (full history)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Merge into develop
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e

        SOURCE_BRANCH=${GITHUB_REF#refs/heads/}
        echo "Source branch: $SOURCE_BRANCH"

        git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git fetch origin

        # checkout hoặc tạo develop
        if git show-ref --verify --quiet refs/remotes/origin/develop; then
          git checkout -B develop origin/develop
        else
          git checkout -b develop
        fi

        # merge
        if git merge --no-ff origin/$SOURCE_BRANCH -m "Auto merge from $SOURCE_BRANCH"; then
          git push origin develop
        else
          git merge --abort || true
          echo "Merge conflict - stop pipeline"
          exit 1
        fi
